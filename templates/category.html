{% extends "base.html" %}
{% block content %}
<style>
  .category-layout {
    display: flex;
    flex-wrap: wrap;
    background: #f9f9f9;
    border: 1px solid #ccc;
    font-size: 16px;
    margin-bottom: 30px;
  }

  .category-left {
    flex: 0 0 220px;
    background: #efefef;
    border-right: 1px solid #ccc;
    padding: 15px;
    max-height: 500px;
    overflow-y: auto;
  }

  .category-right {
    flex: 1;
    padding: 20px;
  }

  .category-left a {
    display: block;
    padding: 8px 10px;
    margin-bottom: 6px;
    color: #0033cc;
    text-decoration: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .category-left a.active,
  .category-left a:hover {
    background: #dbe9ff;
    font-weight: bold;
    text-decoration: underline;
  }

  .category-right ul {
    padding-left: 0;
    list-style: none;
  }

  .category-right li {
    margin-bottom: 12px;
    border-bottom: 1px solid #eee;
    padding-bottom: 8px;
  }

  .category-right a {
    color: #333;
    font-weight: 500;
    text-decoration: none;
  }

  .category-right a:hover {
    text-decoration: underline;
    color: #0033cc;
  }

  @media (max-width: 767px) {
    .category-layout {
      flex-direction: column;
    }

    .category-left,
    .category-right {
      width: 100%;
      padding: 15px;
    }

    .category-left {
      border-right: none;
      border-bottom: 1px solid #ccc;
    }
  }
</style>

<div class="category-layout">
  <!-- Left: Category List -->
  <div class="category-left">
    {% for item in left + right %}
      <a href="#" class="category-link" data-category="{{ item }}">
        {{ item }}
      </a>
    {% endfor %}
  </div>

  <!-- Right: Jobs in Selected Category -->
  <div class="category-right" id="jobs-area">
    <p>Select a category to see jobs.</p>
  </div>
</div>

<script>
  document.querySelectorAll('.category-link').forEach(link => {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      const category = this.dataset.category;

      // Show loading state
      document.getElementById('jobs-area').innerHTML = "<p>Loading jobs...</p>";

      fetch(`/api/category/${category}`)
        .then(res => res.json())
        .then(data => {
          let html = `<h2>${category.charAt(0).toUpperCase() + category.slice(1)} Jobs</h2>`;
          if (data.jobs.length > 0) {
            html += '<ul>';
            data.jobs.forEach(job => {
              html += `<li><a href="/job/${job.id}">${job.title}</a></li>`;
            });
            html += '</ul>';
          } else {
            html += '<p>No jobs found in this category.</p>';
          }

          document.getElementById('jobs-area').innerHTML = html;

          // Update active class
          document.querySelectorAll('.category-link').forEach(a => a.classList.remove('active'));
          this.classList.add('active');
        });
    });
  });
</script>
