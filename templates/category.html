{% extends "base.html" %}
{% block content %}
  <h2>{{ category_name|title }} Jobs</h2>
  {% if jobs %}
    <ul>
      {% for job in jobs %}
        <li><a href="{{ url_for('job_detail', job_id=job.id) }}">{{ job.title }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No jobs found in this category.</p>
  {% endif %}
{% endblock %}
