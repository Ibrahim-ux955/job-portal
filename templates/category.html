{% extends "base.html" %}
{% block content %}
<style>
  .category-layout {
    display: flex;
    flex-wrap: wrap;
    background: #f9f9f9;
    border: 1px solid #ccc;
    font-size: 16px;
    margin-bottom: 30px;
  }

  .category-left {
    flex: 0 0 220px;
    background: #efefef;
    border-right: 1px solid #ccc;
    padding: 15px;
    max-height: 500px;
    overflow-y: auto;
  }

  .category-right {
    flex: 1;
    padding: 20px;
  }

  .category-left a {
    display: block;
    padding: 8px 10px;
    margin-bottom: 6px;
    color: #0033cc;
    text-decoration: none;
    border-radius: 4px;
  }

  .category-left a.active,
  .category-left a:hover {
    background: #dbe9ff;
    font-weight: bold;
    text-decoration: underline;
  }

  .category-right ul {
    padding-left: 0;
    list-style: none;
  }

  .category-right li {
    margin-bottom: 12px;
    border-bottom: 1px solid #eee;
    padding-bottom: 8px;
  }

  .category-right a {
    color: #333;
    font-weight: 500;
    text-decoration: none;
  }

  .category-right a:hover {
    text-decoration: underline;
    color: #0033cc;
  }

  @media (max-width: 767px) {
    .category-layout {
      flex-direction: column;
    }

    .category-left,
    .category-right {
      width: 100%;
      padding: 15px;
    }

    .category-left {
      border-right: none;
      border-bottom: 1px solid #ccc;
    }
  }
</style>

<div class="category-layout">
  <!-- Left: Category List -->
  <div class="category-left">
    {% for item in left + right %}
      <a href="{{ url_for('category_jobs', category=item) }}"
         class="{% if item == category_name %}active{% endif %}">
        {{ item }}
      </a>
    {% endfor %}
  </div>

  <!-- Right: Jobs in Selected Category -->
  <div class="category-right">
    <h2>{{ category_name|title }} Jobs</h2>
    {% if jobs %}
      <ul>
        {% for job in jobs %}
          <li><a href="{{ url_for('job_detail', job_id=job.id) }}">{{ job.title }}</a></li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No jobs found in this category.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
