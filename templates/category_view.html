{% extends "base.html" %}
{% block content %}
<style>
    .category-layout {
        display: flex;
        flex-wrap: wrap;
        background: #f9f9f9;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    .category-left, .category-right {
        padding: 15px;
        min-width: 150px;
    }

    .category-left {
        background: #efefef;
        border-right: 1px solid #ccc;
        width: 30%;
    }

    .category-right {
        width: 70%;
    }

    .category-left a,
    .category-right a {
        display: block;
        margin-bottom: 8px;
        color: #0033cc;
        text-decoration: none;
    }

    .category-left a:hover,
    .category-right a:hover {
        text-decoration: underline;
    }

    @media (max-width: 767px) {
        .category-layout {
            flex-direction: column;
        }

        .category-left,
        .category-right {
            width: 100%;
        }

        .category-left {
            border-right: none;
            border-bottom: 1px solid #ccc;
        }
    }

    .map-container {
        margin-top: 30px;
        border: 1px solid #ccc;
        height: 300px;
        width: 100%;
    }

    .map-container iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>

<!-- ✅ Craigslist-style category layout -->
<div class="category-layout">
    <div class="category-left">
        <a href="#">community</a>
        <a href="#">for sale</a>
        <a href="#">gigs</a>
        <a href="#">housing</a>
        <a href="#">jobs</a>
        <a href="#">services</a>
    </div>
    <div class="category-right">
        <a href="#">ALL JOBS</a>
        <a href="#">admin/office</a>
        <a href="#">business</a>
        <a href="#">customer service</a>
        <a href="#">education</a>
        <a href="#">engineering</a>
        <a href="#">etcetera</a>
        <a href="#">finance</a>
        <a href="#">food/bev/hosp</a>
        <a href="#">general labor</a>
    </div>
</div>

<!-- ✅ Map preview restored -->
<div class="map-container">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509898!2d144.9537353155044!3d-37.816279742021746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d43f1f50f0f%3A0x1d4e0c14c7e65ed9!2sMelbourne%20Central!5e0!3m2!1sen!2sau!4v1600000000000"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>
{% endblock %}
