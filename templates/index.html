<!DOCTYPE html>
<html lang="en">
<head>
    <title>Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script>
        // Set dark mode before content loads to avoid white flash
        if (localStorage.getItem('darkMode') === 'on') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        :root {
            --bg: #fff;
            --text: #000;
        }

        .dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
        }

        .dark-mode select,
        .dark-mode input,
        .dark-mode textarea {
            background-color: #2c2c2c;
            color: #fff;
            border-color: #555;
        }

        .dark-mode a {
            color: #80caff;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            margin-right: 10px;
            text-decoration: none;
            color: blue;
        }

        nav span {
            margin-right: 10px;
        }

        #darkModeToggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            font-size: 1em;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        #darkModeToggle i {
            color: orange;
            font-size: 1em;
        }

        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* ✅ Mobile-Only Responsive CSS */
        @media (max-width: 767px) {
            body {
                padding: 10px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
                width: 100%;
            }

            nav a, nav span, #darkModeToggle, select {
                font-size: 16px;
                width: 100%;
                padding: 6px 0;
            }

            h1 a {
                font-size: 24px;
            }

            .container-fluid {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
<!-- The rest of your body content will go here -->
</body>
</html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster plugin -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

{% extends "base.html" %}

{% block head %}
    <script>
        // Apply dark mode before DOM renders
        if (localStorage.getItem('darkMode') === 'on') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <!-- External Stylesheets and Scripts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
{% endblock %}

{% block content %}
<div class="home-top">
    <h1 class="welcome-title">{{ _('Welcome to Job Portal') }}</h1>

    {% if not user %}
        <p>
           
        </p>
    {% endif %}

    <a href="{{ url_for('post_job') }}" class="post-job-button">
        + {{ _('Post a Job') }}
    </a>
</div>

<!-- Search & Filter Section -->
<div class="filter-group">
    <input type="text" id="searchInput" placeholder="{{ _('Search jobs...') }}" />

    <label for="categoryFilter">{{ _('Category:') }}</label>
    <select id="categoryFilter">
        <option value="">{{ _('All') }}</option>
        {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
    </select>

    <label for="locationFilter">{{ _('City:') }}</label>
    <select id="locationFilter">
        <option value="">{{ _('All') }}</option>
        {% for job in jobs if job.location %}
            <option value="{{ job.location }}">{{ job.location }}</option>
        {% endfor %}
    </select>

    <button type="button" id="applyFilters" class="filter-button">
        {{ _('Filter') }} <i class="fas fa-filter"></i>
    </button>
    
</div>

<h2>{{ _('Recent Job Locations') }}</h2>
<div id="job-map"></div>

<style>
    .category-layout {
        display: flex;
        flex-wrap: wrap;
        background: #f9f9f9;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    .category-left, .category-right {
        padding: 15px;
        min-width: 150px;
    }

    .category-left {
        background: #efefef;
        border-right: 1px solid #ccc;
        width: 30%;
    }

    .category-right {
        width: 70%;
    }

    .category-left a,
    .category-right a {
        display: block;
        margin-bottom: 8px;
        color: #0033cc;
        text-decoration: none;
    }

    .category-left a:hover,
    .category-right a:hover {
        text-decoration: underline;
    }

    @media (max-width: 767px) {
        .category-layout {
            flex-direction: column;
        }

        .category-left,
        .category-right {
            width: 100%;
        }

        .category-left {
            border-right: none;
            border-bottom: 1px solid #ccc;
        }
    }

    #job-map {
        height: 400px;
        width: 100%;
        margin-top: 20px;
    }

</style>

<div class="category-layout mt-4 mb-4">
    <div class="category-left">
        <a href="{{ url_for('category', category_name='for sale') }}">for sale</a>
        <a href="{{ url_for('category', category_name='gigs') }}">gigs</a>
        <a href="{{ url_for('category', category_name='housing') }}">housing</a>
        <a href="{{ url_for('category', category_name='jobs') }}">jobs</a>
        <a href="{{ url_for('category', category_name='services') }}">services</a>
        
    </div>
  


<script>
    document.addEventListener("DOMContentLoaded", function () {
        var map = L.map("job-map");
    
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: 'Map data © <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
        }).addTo(map);
    
        const allJobMarkers = [
            {% for job in jobs if job.latitude and job.longitude %}
                {
                    lat: {{ job.latitude }},
                    lng: {{ job.longitude }},
                    title: "{{ job.title|escape }}",
                    company: "{{ job.company|escape }}",
                    url: "{{ url_for('job_detail', job_id=job.id) }}",
                    category: "{{ job.category }}",
                    location: "{{ job.location }}"
                },
            {% endfor %}
        ];
    
        const markers = L.markerClusterGroup();
        map.addLayer(markers);
    
        function renderMarkers(category = "", location = "") {
            markers.clearLayers();
    
            const filtered = allJobMarkers.filter(job =>
                (category === "" || job.category === category) &&
                (location === "" || job.location === location)
            );
    
            filtered.forEach(job => {
                const marker = L.marker([job.lat, job.lng])
                    .bindPopup(`<strong>${job.title}</strong><br>${job.company}<br><a href="${job.url}">View Job</a>`);
                markers.addLayer(marker);
            });
    
            if (filtered.length > 0) {
                map.fitBounds(markers.getBounds().pad(0.2));
            } else {
                map.setView([20, 0], 2);
            }
        }
    
        // Initial render
        renderMarkers();
    
        // Listen for filter changes
        document.getElementById("categoryFilter").addEventListener("change", function () {
            renderMarkers(this.value, document.getElementById("locationFilter").value);
        });
    
        document.getElementById("locationFilter").addEventListener("change", function () {
            renderMarkers(document.getElementById("categoryFilter").value, this.value);
        });
    });
</script>

<script>
    const toggleBtn = document.getElementById('darkModeToggle');
    const icon = toggleBtn.querySelector('i');

    function setDarkMode(on) {
        if (on) {
            document.documentElement.classList.add('dark-mode');
            localStorage.setItem('darkMode', 'on');
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
        } else {
            document.documentElement.classList.remove('dark-mode');
            localStorage.setItem('darkMode', 'off');
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
        }
    }

    toggleBtn?.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark-mode');
        setDarkMode(!isDark);
    });

    window.addEventListener('DOMContentLoaded', () => {
        const isDark = document.documentElement.classList.contains('dark-mode');
        if (isDark) {
            icon?.classList.remove('fa-moon');
            icon?.classList.add('fa-sun');
        } else {
            icon?.classList.remove('fa-sun');
            icon?.classList.add('fa-moon');
        }
    });
</script>
{% endblock %}
